name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0) — only used for manual triggers'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS binaries
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(cargo metadata --format-version=1 --no-deps | sed -n 's/.*"version":"\([^"]*\)".*/\1/p')"
          fi
          TARGET="${{ matrix.target }}"
          BINARY="target/${TARGET}/release/imessage-chatlab"
          ARCHIVE="imessage-chatlab-${VERSION}-${TARGET}.tar.gz"
          tar czf "${ARCHIVE}" -C "$(dirname "${BINARY}")" "$(basename "${BINARY}")"
          echo "archive=${ARCHIVE}" >> "$GITHUB_ENV"
          echo "version=${VERSION}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: imessage-chatlab-*.tar.gz

  build-linux:
    name: Build Linux binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            cross: false
          - target: aarch64-unknown-linux-gnu
            cross: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Install zig
        if: matrix.cross
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Build (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross via zigbuild)
        if: matrix.cross
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(cargo metadata --format-version=1 --no-deps | sed -n 's/.*"version":"\([^"]*\)".*/\1/p')"
          fi
          TARGET="${{ matrix.target }}"
          BINARY="target/${TARGET}/release/imessage-chatlab"
          ARCHIVE="imessage-chatlab-${VERSION}-${TARGET}.tar.gz"
          tar czf "${ARCHIVE}" -C "$(dirname "${BINARY}")" "$(basename "${BINARY}")"
          echo "archive=${ARCHIVE}" >> "$GITHUB_ENV"
          echo "version=${VERSION}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: imessage-chatlab-*.tar.gz

  build-windows:
    name: Build Windows binary
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_NAME -match '^v') {
            $VERSION = $env:GITHUB_REF_NAME.Substring(1)
          } elseif ($env:INPUT_VERSION) {
            $VERSION = $env:INPUT_VERSION
          } else {
            $VERSION = (cargo metadata --format-version=1 --no-deps | Select-String '"version":"([^"]+)"' | ForEach-Object { $_.Matches.Groups[1].Value })
          }
          $TARGET = "x86_64-pc-windows-msvc"
          $BINARY = "target/$TARGET/release/imessage-chatlab.exe"
          $ARCHIVE = "imessage-chatlab-$VERSION-$TARGET.zip"
          Compress-Archive -Path $BINARY -DestinationPath $ARCHIVE
          echo "archive=$ARCHIVE" >> $env:GITHUB_ENV
          echo "version=$VERSION" >> $env:GITHUB_ENV
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: x86_64-pc-windows-msvc
          path: imessage-chatlab-*.zip

  checksums:
    name: Generate SHA256 checksums
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS.txt
        run: |
          cd artifacts
          sha256sum imessage-chatlab-* > SHA256SUMS.txt

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v7
        with:
          name: SHA256SUMS
          path: artifacts/SHA256SUMS.txt

  release:
    name: Create GitHub Release
    needs: [build-macos, build-linux, build-windows, checksums]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    name: Publish to crates.io
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
